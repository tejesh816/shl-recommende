<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHL Recommender Chatbot</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        #chat-box { width: 400px; height: 400px; background: white; border: 1px solid #ccc; overflow-y: auto; padding: 10px; margin-bottom: 10px; border-radius: 5px; }
        #user-input { width: 310px; padding: 8px; }
        button { padding: 8px 12px; cursor: pointer; }
        .user-msg { color: blue; text-align: right; margin: 5px 0; }
        .bot-msg { color: green; text-align: left; margin: 5px 0; }
    </style>
</head>
<body>
    <h2>Recommender Chatbot</h2>
    <div id="chat-box"></div>
    <input type="text" id="user-input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const chatBox = document.getElementById('chat-box');
            const message = inputElement.value.trim();
            if (!message) return;

            // Display user message
            chatBox.innerHTML += `<div class="user-msg"><b>You:</b> ${message}</div>`;
            inputElement.value = '';

            try {
                // Connects directly to your live Railway cloud server
                const response = await fetch('https://shl-recommende-production-6fba.up.railway.app/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                // Display bot response
                chatBox.innerHTML += `<div class="bot-msg"><b>Bot:</b> ${data.response || data.message || JSON.stringify(data)}</div>`;
            } catch (error) {
                chatBox.innerHTML += `<div class="bot-msg" style="color:red;"><b>Error:</b> Could not reach backend server.</div>`;
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
